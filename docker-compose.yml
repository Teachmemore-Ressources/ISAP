# ISAP Phase 2 — banc Docker Compose
# 3 agents passifs + 1 collecteur sur un réseau bridge dédié.
# Les agents émettent leurs vrais métriques psutil vers le collecteur en UDP.
#
# Ports IANA unassigned (https://www.iana.org/assignments/service-names-port-numbers) :
#   HTTP :8765  → dashboard web + API REST
#   WS   :8766  → push live (ouvert par dashboard.html)
#   UDP  :8767  → réception des Pulses ISAP

name: isap

networks:
  isap_net:
    driver: bridge

services:
  collector:
    image: python:3.12-slim
    container_name: isap_collector
    hostname: collector
    networks: [isap_net]
    ports:
      - "8767:8767/udp"    # Pulses ISAP  (agents → collecteur)
      - "8765:8765/tcp"    # Dashboard HTTP  → http://localhost:8765
      - "8766:8766/tcp"    # WebSocket live  → ws://localhost:8766
    volumes:
      - ./:/isap                           # source live
      - ./data:/isap/data                  # archives + métriques
    working_dir: /isap
    environment:
      - PYTHONUNBUFFERED=1
      - ISAP_UDP_PORT=8767
      - ISAP_HTTP_PORT=8765
      - ISAP_WS_PORT=8766
      - ISAP_ARCHIVE_PATH=/isap/data/observations_phase2.jsonl
      - ISAP_DATA_DIR=/isap/data
    command: >
      bash -c "pip install --quiet --no-cache-dir websockets &&
               echo '[collector] starting...' &&
               python3 -u dashboard_server.py"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/v1/status')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  agent_a:
    build: .
    container_name: isap_agent_a
    hostname: agent_a
    networks: [isap_net]
    environment:
      - ISAP_NODE_ID=agent_a
      - ISAP_COLLECTOR_HOST=collector
      - ISAP_COLLECTOR_PORT=8767
      - ISAP_INTERVAL_S=1.0
      - ISAP_WHISPER_S=1.0
      - ISAP_STORM_S=0.2
    depends_on:
      collector: { condition: service_started }
    cap_add: [SYS_NICE]

  agent_b:
    build: .
    container_name: isap_agent_b
    hostname: agent_b
    networks: [isap_net]
    environment:
      - ISAP_NODE_ID=agent_b
      - ISAP_COLLECTOR_HOST=collector
      - ISAP_COLLECTOR_PORT=8767
      - ISAP_INTERVAL_S=1.0
      - ISAP_WHISPER_S=1.0
      - ISAP_STORM_S=0.2
    depends_on:
      collector: { condition: service_started }
    cap_add: [SYS_NICE]

  agent_c:
    build: .
    container_name: isap_agent_c
    hostname: agent_c
    networks: [isap_net]
    environment:
      - ISAP_NODE_ID=agent_c
      - ISAP_COLLECTOR_HOST=collector
      - ISAP_COLLECTOR_PORT=8767
      - ISAP_INTERVAL_S=1.0
      - ISAP_WHISPER_S=1.0
      - ISAP_STORM_S=0.2
    depends_on:
      collector: { condition: service_started }
    cap_add: [SYS_NICE]
